name: CI

on:
  push:
    branches: [main, "**"]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Lint & test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # 3.9 mirrors the production runtime (the .pkl pickle ABI); 3.11 guards
        # against accidental version-specific breakage in the test/dev path.
        python-version: ["3.9", "3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install system deps (libgomp for LightGBM)
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libgomp1

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r bidder.submission.code/python/requirements.txt
          pip install pytest ruff

      - name: Lint (ruff)
        run: ruff check .

      - name: Run tests
        run: pytest -v
