# Ruff configuration for ADPULSE.
# Target the production runtime version.
target-version = "py39"
line-length = 120

extend-exclude = [
    ".venv",
    ".venv-test",
    "venv",
    "dataset",
    "frontend",
]

[lint]
# pyflakes (F) + a pragmatic pycodestyle error subset (E). Style-only rules are
# left off so CI fails on real problems (unused names, undefined refs), not
# formatting nits.
select = ["E4", "E7", "E9", "F"]
